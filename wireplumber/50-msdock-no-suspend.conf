# Microsoft Audio Dock — never suspend its audio output node.
#
# This fixes the SECOND failure mode of this dock (independent from the hub
# autosuspend issue handled by the udev rule):
#
#   When PipeWire/WirePlumber suspends the dock's USB audio interface (the
#   default a few seconds after audio goes idle), the dock's firmware decides
#   it is unused and resets itself every ~5 minutes. The whole USB tree
#   (both internal hubs + audio + HID) disconnects and re-enumerates in the
#   same second, with ZERO kernel errors — because the reset is initiated by
#   the dock itself, kernel-side fixes (autosuspend off, LPM off) cannot stop
#   it. Each reset re-triggers KDE's "USB device detected" popup and resets
#   the volume state.
#
# Keeping the output node open at all times means the dock always sees an
# active host and never enters that buggy power-save reset path.
#
# Both properties are required:
#   session.suspend-timeout-seconds = 0  -> never suspend after going idle
#   node.always-process = true           -> keep the node running from the
#       moment it is created (without this, a freshly plugged dock that has
#       not played any sound yet sits in SUSPENDED and still resets)
#
# Only the output (sink) is pinned: keeping the sink open is enough to keep
# the dock awake; the microphone keeps the default suspend behaviour.
#
# Matches by device-reported name, so it affects ONLY this dock — all other
# sound devices keep their normal power saving.
#
# Install: copy to /etc/wireplumber/wireplumber.conf.d/ (system-wide) or
# ~/.config/wireplumber/wireplumber.conf.d/ (per user), then:
#   systemctl --user restart wireplumber

monitor.alsa.rules = [
  {
    matches = [
      {
        node.name = "~alsa_output.usb-Microsoft_Microsoft_Audio_Dock.*"
      }
    ]
    actions = {
      update-props = {
        session.suspend-timeout-seconds = 0
        node.always-process = true
      }
    }
  }
]
